<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Powell Parker — Executive Letter</title>
<meta name="description" content="Official correspondence — From the Desk of Powell Parker">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1B2A40;
  --deep: #0A1525;
  --gold: #C9A84C;
  --gold-light: #E8D5A3;
  --gold-dark: #9A7A2E;
  --cream: #F5F0E8;
  --text: #1e1e1e;
  --text-mid: #3a3a3a;
  --text-light: #5a5a5a;
  --rule: #d8d2c4;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; }
body {
  font-family: 'EB Garamond', Georgia, serif;
  background: #b8b5af;
  -webkit-font-smoothing: antialiased;
}

/* ── EDITOR BAR ── */
.editor-bar {
  background: var(--deep);
  border-bottom: 2px solid var(--gold);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  flex-wrap: wrap;
  gap: 8px;
}
.editor-bar .bar-left {
  display: flex;
  align-items: center;
  gap: 12px;
}
.editor-bar .bar-title {
  font-family: 'Cormorant', serif;
  font-size: 1rem;
  font-weight: 700;
  color: var(--gold);
  letter-spacing: 0.06em;
}
.editor-bar .bar-right {
  display: flex;
  gap: 6px;
  align-items: center;
  flex-wrap: wrap;
}
.bar-btn {
  font-family: 'Lato', sans-serif;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.05em;
  text-transform: uppercase;
  padding: 7px 14px;
  border: 1px solid var(--gold);
  border-radius: 4px;
  cursor: pointer;
  transition: all 0.25s;
  background: transparent;
  color: var(--gold);
  white-space: nowrap;
}
.bar-btn:hover { background: var(--gold); color: var(--deep); }
.bar-btn.primary { background: var(--gold); color: var(--deep); }
.bar-btn.primary:hover { background: var(--gold-light); }
.bar-btn:disabled { opacity: 0.4; cursor: not-allowed; }
.mode-indicator {
  font-family: 'Lato', sans-serif;
  font-size: 0.6rem;
  letter-spacing: 0.1em;
  text-transform: uppercase;
  padding: 4px 10px;
  border-radius: 12px;
  font-weight: 700;
}
.mode-edit { background: rgba(201,168,76,0.15); color: var(--gold); }
.mode-view { background: rgba(45,106,79,0.15); color: #52b788; }

/* ── PAPER TEXTURES ── */
.page.scroll { background: #f2e8c9; background-image: url('https://www.transparenttextures.com/patterns/parchment.png'); }
.page.legal { background: #fff9c4; background-image: linear-gradient(#e1d8a7 1px, transparent 1px); background-size: 100% 2rem; border-left: 5px double #ff8a8a; }
.page.college { background: #fff; background-image: linear-gradient(#9ed1ff 1px, transparent 1px); background-size: 100% 1.6rem; border-left: 2px solid #ffb3b3; }
.page.executive { background: #fff; }

/* ── STATUS TOAST ── */
.toast {
  position: fixed;
  top: 60px;
  left: 50%;
  transform: translateX(-50%) translateY(-20px);
  padding: 12px 24px;
  border-radius: 8px;
  font-family: 'Lato', sans-serif;
  font-size: 0.82rem;
  font-weight: 700;
  z-index: 200;
  opacity: 0;
  transition: all 0.3s;
  pointer-events: none;
  max-width: 90%;
  text-align: center;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: #2ecc71; color: #fff; }
.toast.error { background: #e74c3c; color: #fff; }
.toast.loading { background: var(--gold); color: var(--deep); }

/* ── SHARE PANEL ── */
.share-panel {
  max-width: 700px;
  margin: 0 auto 16px;
  background: var(--deep);
  border: 2px solid var(--gold);
  border-radius: 10px;
  padding: 20px 24px;
  display: none;
  text-align: center;
}
.share-panel.active { display: block; }
.share-panel h3 {
  font-family: 'Cormorant', serif;
  font-size: 1.1rem;
  color: var(--gold);
  margin-bottom: 12px;
}
.share-url-box {
  background: rgba(255,255,255,0.06);
  border: 1px solid rgba(201,168,76,0.3);
  border-radius: 6px;
  padding: 10px 14px;
  font-family: monospace;
  font-size: 0.82rem;
  color: var(--gold-light);
  word-break: break-all;
  margin-bottom: 14px;
}
.share-btns { display: flex; gap: 8px; justify-content: center; flex-wrap: wrap; }
.share-btns .bar-btn { font-size: 0.72rem; padding: 9px 18px; }

/* ── INPUT PANEL ── */
.input-panel {
  max-width: 700px;
  margin: 20px auto;
  background: var(--deep);
  border: 1px solid rgba(201,168,76,0.2);
  border-radius: 10px;
  padding: 24px;
  display: none;
}
.input-panel.active { display: block; }
.input-panel h3 {
  font-family: 'Cormorant', serif;
  font-size: 1.15rem;
  color: var(--gold);
  margin-bottom: 14px;
  font-weight: 700;
}
.field-row { margin-bottom: 12px; }
.field-row label {
  display: block;
  font-family: 'Lato', sans-serif;
  font-size: 0.68rem;
  font-weight: 700;
  letter-spacing: 0.08em;
  text-transform: uppercase;
  color: var(--gold-light);
  margin-bottom: 4px;
}
.field-row input, .field-row textarea, .field-row select {
  width: 100%;
  background: rgba(255,255,255,0.05);
  border: 1px solid rgba(201,168,76,0.25);
  border-radius: 6px;
  padding: 10px 14px;
  font-family: 'EB Garamond', serif;
  font-size: 1rem;
  color: var(--cream);
  transition: border-color 0.3s;
  -webkit-appearance: none;
}
.field-row input:focus, .field-row textarea:focus {
  outline: none;
  border-color: var(--gold);
}
.field-row textarea { min-height: 180px; resize: vertical; line-height: 1.8; }
.field-row select { background: var(--deep); }
.field-row .hint {
  font-family: 'Lato', sans-serif;
  font-size: 0.65rem;
  color: rgba(255,255,255,0.3);
  margin-top: 3px;
}
.field-grid {
  display: grid;
  grid-template-columns: 1fr 1fr;
  gap: 12px;
}

/* ── EXHIBIT CARDS ── */
.exhibit-card {
  background: rgba(255,255,255,0.03);
  border: 1px dashed rgba(201,168,76,0.3);
  border-radius: 8px;
  padding: 14px;
  margin-bottom: 12px;
  position: relative;
}
.exhibit-card .btn-remove {
  position: absolute;
  top: 10px;
  right: 10px;
  background: transparent;
  border: none;
  color: #ff6b6b;
  cursor: pointer;
  font-family: 'Lato', sans-serif;
  font-size: 0.62rem;
  font-weight: 700;
  text-transform: uppercase;
}
.exhibit-card .btn-remove:hover { text-decoration: underline; }
.exhibit-preview { margin-top: 8px; text-align: center; }
.exhibit-preview img { max-width: 100%; max-height: 180px; border: 2px solid var(--gold); border-radius: 4px; }
.slider-row { display: flex; align-items: center; gap: 10px; margin-top: 6px; }
.slider-row input[type="range"] { flex: 1; accent-color: var(--gold); }
.slider-val { font-family: 'Lato', sans-serif; font-size: 0.68rem; color: var(--gold-light); min-width: 32px; }
.btn-add-exhibit { width: 100%; border-style: dashed; padding: 10px; background: rgba(201,168,76,0.04); margin-top: 4px; }

/* ── SAVED LETTERS ── */
.saved-section { margin-top: 18px; padding-top: 16px; border-top: 1px solid rgba(201,168,76,0.15); }
.saved-section h3 { font-family: 'Cormorant', serif; font-size: 1rem; color: var(--gold); margin-bottom: 10px; }
.saved-list { list-style: none; }
.saved-item { padding: 9px 12px; background: rgba(201,168,76,0.05); border: 1px solid rgba(201,168,76,0.12); border-radius: 6px; margin-bottom: 5px; display: flex; justify-content: space-between; align-items: center; gap: 8px; }
.saved-item a { color: var(--gold); text-decoration: none; font-family: 'Lato', sans-serif; font-size: 0.78rem; font-weight: 700; flex: 1; min-width: 0; overflow: hidden; text-overflow: ellipsis; white-space: nowrap; }
.saved-item .meta { font-family: 'Lato', sans-serif; font-size: 0.65rem; color
