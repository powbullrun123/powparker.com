<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Powell Parker — Executive Letter</title>
<meta name="description" content="Official correspondence — From the Desk of Powell Parker">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1B2A40;
  --deep: #0A1525;
  --gold: #C9A84C;
  --gold-light: #E8D5A3;
  --gold-dark: #9A7A2E;
  --cream: #F5F0E8;
  --text: #1e1e1e;
  --text-mid: #3a3a3a;
  --text-light: #5a5a5a;
  --rule: #d8d2c4;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
html { font-size: 16px; }
body {
  font-family: 'EB Garamond', Georgia, serif;
  background: #b8b5af;
  -webkit-font-smoothing: antialiased;
}

/* ── EDITOR BAR ── */
.editor-bar {
  background: var(--deep);
  border-bottom: 2px solid var(--gold);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  flex-wrap: wrap;
  gap: 8px;
}
.editor-bar .bar-left { display: flex; align-items: center; gap: 12px; }
.editor-bar .bar-title { font-family: 'Cormorant', serif; font-size: 1rem; font-weight: 700; color: var(--gold); letter-spacing: 0.06em; }
.editor-bar .bar-right { display: flex; gap: 6px; align-items: center; }
.bar-btn { font-family: 'Lato', sans-serif; font-size: 0.68rem; font-weight: 700; letter-spacing: 0.05em; text-transform: uppercase; padding: 7px 14px; border: 1px solid var(--gold); border-radius: 4px; cursor: pointer; transition: all 0.25s; background: transparent; color: var(--gold); }
.bar-btn:hover { background: var(--gold); color: var(--deep); }
.bar-btn.primary { background: var(--gold); color: var(--deep); }

/* ── PAPER TEXTURES ── */
.page.scroll { background: #f2e8c9; background-image: url('https://www.transparenttextures.com/patterns/parchment.png'); }
.page.legal { background: #fff9c4; background-image: linear-gradient(#e1d8a7 1px, transparent 1px); background-size: 100% 2rem; border-left: 5px double #ff8a8a; }
.page.college { background: #fff; background-image: linear-gradient(#9ed1ff 1px, transparent 1px); background-size: 100% 1.6rem; border-left: 2px solid #ffb3b3; }
.page.executive { background: #fff; }

/* ── INPUT PANEL ── */
.input-panel { max-width: 700px; margin: 20px auto; background: var(--deep); border: 1px solid rgba(201,168,76,0.2); border-radius: 10px; padding: 24px; color: white; display: block; }
.input-panel.hidden { display: none; }
.field-row { margin-bottom: 12px; }
.field-row label { display: block; font-family: 'Lato', sans-serif; font-size: 0.68rem; font-weight: 700; color: var(--gold-light); margin-bottom: 4px; text-transform: uppercase; }
.field-row input, .field-row textarea { width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(201,168,76,0.25); border-radius: 6px; padding: 10px; color: var(--cream); font-family: 'EB Garamond', serif; font-size: 1rem; }
.field-grid { display: grid; grid-template-columns: 1fr 1fr; gap: 12px; }

/* ── LETTER PAGE ── */
.page-container { display: flex; justify-content: center; padding: 24px 12px 40px; }
.page { width: 816px; min-height: 1056px; box-shadow: 0 6px 40px rgba(0,0,0,0.3); position: relative; display: flex; flex-direction: column; }
.top-bar { height: 10px; background: linear-gradient(90deg, var(--gold-dark), var(--gold), var(--gold-light)); }
.letterhead { display: flex; align-items: center; justify-content: space-between; padding: 40px 56px 24px; }
.lh-seal { width: 120px; height: 120px; border-radius: 50%; object-fit: contain; }
.lh-name { font-family: 'Cormorant', serif; font-size: 2rem; font-weight: 700; color: var(--navy); }
.lh-motto { font-size: 0.8rem; color: var(--gold); letter-spacing: 0.1em; text-transform: uppercase; }

.music-embed { margin: 0 56px 20px; border-radius: 12px; overflow: hidden; }

.letter-content { padding: 20px 56px 140px; font-size: 1.1rem; line-height: 1.7; color: var(--text); flex-grow: 1; }
.l-recipient { margin-bottom: 25px; }
.l-recipient strong { display: block; font-size: 1.2rem; color: var(--navy); }
.l-body p { margin-bottom: 1.2em; text-align: justify; }

/* EXHIBITS */
.print-exhibit { margin: 40px 0; text-align: center; break-inside: avoid; }
.print-exhibit img { max-width: 80%; border: 3px solid var(--gold); }
.print-exhibit-cap { font-style: italic; color: var(--text-light); margin-top: 10px; }

@media print {
  .editor-bar, .input-panel { display: none !important; }
  body { background: #fff; }
  .page { box-shadow: none; width: 100%; }
}
</style>
</head>
<body>

<div class="editor-bar">
  <div class="bar-left">
    <div class="bar-title">POWELL PARKER</div>
    <select id="paperSelect" class="bar-btn" onchange="updatePaper()" style="background: var(--navy);">
      <option value="executive">Executive White</option>
      <option value="scroll">Ancient Scroll</option>
      <option value="legal">Legal Yellow</option>
      <option value="college">College Ruled</option>
    </select>
  </div>
  <div class="bar-right">
    <button class="bar-btn" onclick="toggleEdit()">Toggle Editor</button>
    <button class="bar-btn primary" onclick="window.print()">Print PDF</button>
  </div>
</div>

<div class="input-panel" id="inputPanel">
  <div class="field-row">
    <label>Dossier Title (Hero Heading)</label>
    <input type="text" id="inHero" oninput="render()" placeholder="STRATEGIC UPDATE: KEARNY WATER">
  </div>
  <div class="field-grid">
    <div class="field-row"><label>Date</label><input type="text" id="inDate" oninput="render()" placeholder="May 19, 2026"></div>
    <div class="field-row"><label>Subject</label><input type="text" id="inSubject" oninput="render()" placeholder="Re: Water Rights"></div>
  </div>
  <div class="field-row">
    <label>Recipient (Separate lines with commas)</label>
    <input type="text" id="inRecipient" oninput="render()" placeholder="Mayor Curtis Stacy, Town Hall, AZ">
  </div>
  <div class="field-row">
    <label>Apple Music Link</label>
    <input type="text" id="inMusic" oninput="render()" placeholder="https://music.apple.com/...">
  </div>
  <div class="field-row">
    <label>Letter Body</label>
    <textarea id="inBody" oninput="render()" placeholder="Dear Mayor..."></textarea>
  </div>
  <div class="field-row">
    <label>Photo URL (Exhibit)</label>
    <input type="text" id="inPhoto" oninput="render()" placeholder="https://example.com/image.jpg">
  </div>
</div>

<div class="page-container">
  <article class="page executive" id="letterPage">
    <div class="top-bar"></div>
    
    <header class="letterhead">
      <div style="display:flex; align-items:center;">
        <img src="https://powparker.com/powparker-logo.webp" class="lh-seal" alt="Seal">
        <div style="margin-left:20px;">
          <div class="lh-name">Powell Parker</div>
          <div class="lh-motto">Executive Correspondence</div>
        </div>
      </div>
      <div style="text-align:right; font-family:'Lato'; font-size:0.7rem; color:#666;">
        POWPARKER.COM<br>PO BOX 888, KEARNY AZ
      </div>
    </header>

    <div id="musicContainer" class="music-embed"></div>

    <main class="letter-content">
      <h1 id="outHero" style="text-align:center; font-family:'Cormorant'; margin-bottom:30px; display:none;"></h1>
      <div id="outDate" class="l-date"></div>
      <div id="outRecipient" class="l-recipient"></div>
      <div id="outSubject" style="font-weight:700; border-bottom:1px solid #ccc; margin-bottom:20px; display:none;"></div>
      <div id="outBody" class="l-body"></div>
      
      <div id="exhibitArea"></div>

      <div class="l-closing" style="margin-top:40px;">
        Respectfully,<br><br>
        <strong>Powell Parker</strong><br>
        <span style="font-size:0.8rem; color:#666;">Founder, SaveKearnyAZ.org</span>
      </div>
    </main>
  </article>
</div>

<script>
function updatePaper() {
  const p = document.getElementById('letterPage');
  p.className = 'page ' + document.getElementById('paperSelect').value;
}

function toggleEdit() {
  document.getElementById('inputPanel').classList.toggle('hidden');
}

function render() {
  // Simple Fields
  document.getElementById('outDate').innerText = document.getElementById('inDate').value;
  
  const hero = document.getElementById('inHero').value;
  const outHero = document.getElementById('outHero');
  outHero.innerText = hero;
  outHero.style.display = hero ? 'block' : 'none';

  const sub = document.getElementById('inSubject').value;
  const outSub = document.getElementById('outSubject');
  outSub.innerText = sub;
  outSub.style.display = sub ? 'block' : 'none';

  // Recipient Logic
  const recips = document.getElementById('inRecipient').value.split(',');
  let recipHTML = '';
  recips.forEach((line, i) => {
    recipHTML += i === 0 ? `<strong>${line.trim()}</strong>` : `<div>${line.trim()}</div>`;
  });
  document.getElementById('outRecipient').innerHTML = recipHTML;

  // Body Logic
  const body = document.getElementById('inBody').value;
  document.getElementById('outBody').innerHTML = body.split('\n').map(p => p.trim() ? `<p>${p}</p>` : '').join('');

  // Apple Music Fix
  const musicUrl = document.getElementById('inMusic').value;
  const musicCont = document.getElementById('musicContainer');
  if (musicUrl.includes('music.apple.com')) {
    const embedUrl = musicUrl.replace('music.apple.com', 'embed.music.apple.com');
    musicCont.innerHTML = `<iframe allow="autoplay *; encrypted-media *;" frameborder="0" height="150" style="width:100%;max-width:660px;overflow:hidden;background:transparent;" sandbox="allow-forms allow-popups allow-same-origin allow-scripts allow-storage-access-by-user-activation allow-top-navigation-by-user-activation" src="${embedUrl}"></iframe>`;
  } else {
    musicCont.innerHTML = '';
  }

  // Exhibit Logic
  const photo = document.getElementById('inPhoto').value;
  const exArea = document.getElementById('exhibitArea');
  if (photo) {
    exArea.innerHTML = `<div class="print-exhibit"><img src="${photo}"><div class="print-exhibit-cap">Digital Exhibit A</div></div>`;
  } else {
    exArea.innerHTML = '';
  }
}

// Initial Run
render();
</script>
</body>
</html>
