<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Powell Parker - Executive Correspondence</title>
<style>
    /* Base Styles & Navigation Bar */
    body {
        font-family: Arial, sans-serif;
        margin: 0;
        background-color: #f4f4f4;
        color: #333;
    }
    .top-bar {
        background-color: #0B162C; /* Navy */
        color: #C5A880; /* Gold */
        padding: 15px 20px;
        display: flex;
        align-items: center;
        gap: 15px;
        flex-wrap: wrap;
    }
    .top-bar h2 {
        margin: 0;
        font-family: 'Times New Roman', serif;
        font-size: 1.2rem;
        letter-spacing: 2px;
        text-transform: uppercase;
    }
    .btn {
        background: transparent;
        border: 1px solid #C5A880;
        color: #C5A880;
        padding: 8px 15px;
        cursor: pointer;
        font-size: 0.85rem;
        text-transform: uppercase;
        font-weight: bold;
    }
    .btn.solid {
        background: #C5A880;
        color: #0B162C;
    }

    /* Editor Section */
    .editor-container {
        background-color: #0B162C;
        padding: 20px;
        margin: 0 auto;
        border-bottom: 5px solid #C5A880;
    }
    .form-group {
        margin-bottom: 15px;
        display: flex;
        flex-direction: column;
    }
    .form-group label {
        color: #C5A880;
        font-size: 0.75rem;
        text-transform: uppercase;
        margin-bottom: 5px;
        font-weight: bold;
    }
    .form-group input, .form-group textarea {
        background: #152238;
        border: 1px solid #1F304A;
        color: #fff;
        padding: 10px;
        font-family: Arial, sans-serif;
    }
    .form-group textarea {
        resize: vertical;
        min-height: 80px;
    }
    .two-col {
        display: flex;
        gap: 15px;
    }
    .two-col .form-group {
        flex: 1;
    }
    .mic-wrapper {
        position: relative;
        display: flex;
        align-items: flex-start;
        gap: 10px;
    }
    .mic-wrapper textarea {
        flex: 1;
    }
    .mic-btn {
        background: #C5A880;
        border: none;
        border-radius: 50%;
        width: 40px;
        height: 40px;
        font-size: 20px;
        cursor: pointer;
        display: flex;
        justify-content: center;
        align-items: center;
        transition: background 0.2s;
    }
    .mic-btn.recording {
        background: #ff4444;
        animation: pulse 1.5s infinite;
    }

    @keyframes pulse {
        0% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0.7); }
        70% { box-shadow: 0 0 0 10px rgba(255, 68, 68, 0); }
        100% { box-shadow: 0 0 0 0 rgba(255, 68, 68, 0); }
    }

    /* Document Preview Section */
    .document-preview {
        background: #fff;
        max-width: 800px;
        margin: 40px auto;
        padding: 60px;
        box-shadow: 0 0 15px rgba(0,0,0,0.1);
        font-family: 'Times New Roman', serif;
    }
    .doc-header {
        display: flex;
        justify-content: space-between;
        align-items: center;
        margin-bottom: 30px;
    }
    .doc-header-left {
        display: flex;
        align-items: center;
        gap: 20px;
    }
    .seal {
        width: 120px;
        height: 120px;
        /* PLACE YOUR SEAL IMAGE HERE: */
        background: url('your-seal-image.jpg') no-repeat center center/cover;
        border-radius: 50%;
    }
    .header-titles h1 {
        margin: 0;
        color: #112244;
        font-size: 2.2rem;
        font-weight: normal;
    }
    .header-titles h3 {
        margin: 5px 0 0 0;
        color: #C5A880;
        font-size: 0.9rem;
        letter-spacing: 2px;
        font-weight: normal;
        text-transform: uppercase;
    }
    .doc-header-right {
        text-align: right;
        color: #666;
        font-size: 0.85rem;
        line-height: 1.4;
        font-family: Arial, sans-serif;
    }
    .music-embed {
        margin-bottom: 40px;
    }
    .doc-hero-title {
        font-size: 2.5rem;
        margin-bottom: 30px;
        color: #111;
        text-transform: uppercase;
    }
    .doc-meta {
        margin-bottom: 20px;
    }
    .doc-meta p {
        margin: 10px 0;
        font-weight: bold;
        font-size: 1.1rem;
    }
    .doc-meta .subject-line {
        border-bottom: 1px solid #ccc;
        padding-bottom: 10px;
        margin-bottom: 30px;
    }
    .doc-body {
        font-size: 1.1rem;
        line-height: 1.6;
        margin-bottom: 40px;
        white-space: pre-wrap;
    }
    .doc-exhibit {
        margin-bottom: 40px;
        max-width: 100%;
        display: none; /* Hidden until loaded */
    }
    .doc-exhibit img {
        max-width: 100%;
        height: auto;
        border: 1px solid #eee;
    }
    .doc-closing p {
        margin: 5px 0;
        font-size: 1.1rem;
    }
    .doc-closing .signature {
        font-weight: bold;
        margin-top: 30px;
    }
    .doc-closing .title {
        color: #666;
        font-size: 0.9rem;
        font-family: Arial, sans-serif;
    }

    @media print {
        .top-bar, .editor-container { display: none; }
        .document-preview { box-shadow: none; margin: 0; padding: 0; }
    }
</style>
</head>
<body>

<div class="top-bar" id="topBar">
    <h2>Powell Parker</h2>
    <select class="btn" style="background: #0B162C;">
        <option>EXECUTIVE WHITE</option>
    </select>
    <button class="btn" onclick="copyShareLink()">Copy Share Link</button>
    <button class="btn" onclick="toggleEditor()">Toggle Editor</button>
    <button class="btn solid" onclick="window.print()">Print PDF</button>
</div>

<div class="editor-container" id="editorContainer">
    <div class="form-group">
        <label>Dossier Title (Hero Heading)</label>
        <input type="text" id="inHero" value="BUDDY FOR A WALK">
    </div>
    <div class="two-col">
        <div class="form-group">
            <label>Date</label>
            <input type="text" id="inDate" value="May 19, 2026">
        </div>
        <div class="form-group">
            <label>Subject</label>
            <input type="text" id="inSubject" value="Walking Buddy">
        </div>
    </div>
    <div class="form-group">
        <label>Recipient</label>
        <input type="text" id="inRecipient" value="Terry ((Mom))">
    </div>
    <div class="form-group">
        <label>Apple Music Embed URL / Iframe Code</label>
        <input type="text" id="inMusic" placeholder="Paste Apple Music Embed Code here...">
    </div>
    
    <div class="form-group">
        <label>Letter Body</label>
        <div class="mic-wrapper">
            <textarea id="inBody">Buddy and I had the best walk. We met three dogs at the park...</textarea>
            <button class="mic-btn" id="micBtn" title="Speech to Text">🎤</button>
        </div>
    </div>

    <div class="two-col">
        <div class="form-group">
            <label>Closing Name (Signature)</label>
            <input type="text" id="inClosingName" value="Powell Parker">
        </div>
        <div class="form-group">
            <label>Closing Title</label>
            <input type="text" id="inClosingTitle" value="Founder, SaveKearnyAZ.org">
        </div>
    </div>

    <div class="two-col">
        <div class="form-group">
            <label>Photo Share (Upload from device)</label>
            <input type="file" id="inFileUpload" accept="image/*" style="background: transparent; border: none; padding: 0;">
        </div>
        <div class="form-group">
            <label>Or Photo URL (Exhibit)</label>
            <input type="text" id="inPhotoUrl" placeholder="https://...">
        </div>
    </div>
</div>

<div class="document-preview" id="documentPreview">
    <div class="doc-header">
        <div class="doc-header-left">
            <img class="seal" src="your-logo.png" alt="Seal" onerror="this.style.display='none'"> 
            <div class="header-titles">
                <h1>Powell<br>Parker</h1>
                <h3>Executive<br>Correspondence</h3>
            </div>
        </div>
        <div class="doc-header-right">
            POWPARKER.COM<br>
            PO BOX 888,<br>
            KEARNY AZ
        </div>
    </div>

    <div class="music-embed" id="outMusic">
        </div>

    <h2 class="doc-hero-title" id="outHero">BUDDY FOR A WALK</h2>

    <div class="doc-meta">
        <p id="outRecipient">Terry ((Mom))</p>
        <p class="subject-line" id="outSubject">Walking Buddy</p>
    </div>

    <div class="doc-body" id="outBody">Buddy and I had the best walk...</div>

    <div class="doc-exhibit" id="outExhibitContainer">
        <img id="outExhibitImg" src="" alt="Exhibit">
    </div>

    <div class="doc-closing">
        <p>Respectfully,</p>
        <p class="signature" id="outClosingName">Powell Parker</p>
        <p class="title" id="outClosingTitle">Founder, SaveKearnyAZ.org</p>
    </div>
</div>

<script>
    // 1. Data Binding Functionality
    const inputs = ['inHero', 'inDate', 'inSubject', 'inRecipient', 'inBody', 'inClosingName', 'inClosingTitle'];
    const outputs = ['outHero', 'outDate', 'outSubject', 'outRecipient', 'outBody', 'outClosingName', 'outClosingTitle'];

    function updatePreview() {
        // Text Inputs
        document.getElementById('outHero').innerText = document.getElementById('inHero').value;
        document.getElementById('outRecipient').innerText = document.getElementById('inRecipient').value;
        document.getElementById('outSubject').innerText = document.getElementById('inSubject').value;
        document.getElementById('outBody').innerText = document.getElementById('inBody').value;
        document.getElementById('outClosingName').innerText = document.getElementById('inClosingName').value;
        document.getElementById('outClosingTitle').innerText = document.getElementById('inClosingTitle').value;

        // Music (Basic iframe handling)
        const musicVal = document.getElementById('inMusic').value;
        if(musicVal.includes('<iframe')) {
            document.getElementById('outMusic').innerHTML = musicVal;
        }

        // Photo URL handling
        const photoUrl = document.getElementById('inPhotoUrl').value;
        if (photoUrl) {
            document.getElementById('outExhibitImg').src = photoUrl;
            document.getElementById('outExhibitContainer').style.display = 'block';
        }
    }

    // Attach event listeners to all text inputs
    inputs.forEach(id => {
        const el = document.getElementById(id);
        if(el) el.addEventListener('input', updatePreview);
    });
    document.getElementById('inPhotoUrl').addEventListener('input', updatePreview);
    document.getElementById('inMusic').addEventListener('input', updatePreview);

    // 2. Local Photo Upload Functionality
    document.getElementById('inFileUpload').addEventListener('change', function(e) {
        const file = e.target.files[0];
        if (file) {
            const reader = new FileReader();
            reader.onload = function(event) {
                document.getElementById('outExhibitImg').src = event.target.result;
                document.getElementById('outExhibitContainer').style.display = 'block';
                // Clear URL input if file is uploaded
                document.getElementById('inPhotoUrl').value = ''; 
            };
            reader.readAsDataURL(file);
        }
    });

    // 3. Toggle Editor Visibility
    function toggleEditor() {
        const editor = document.getElementById('editorContainer');
        editor.style.display = editor.style.display === 'none' ? 'block' : 'none';
    }

    // 4. Speech to Text (Web Speech API)
    const micBtn = document.getElementById('micBtn');
    const inBody = document.getElementById('inBody');
    
    if ('webkitSpeechRecognition' in window || 'SpeechRecognition' in window) {
        const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;
        const recognition = new SpeechRecognition();
        
        recognition.continuous = true;
        recognition.interimResults = true;

        let isRecording = false;

        micBtn.onclick = () => {
            if (isRecording) {
                recognition.stop();
            } else {
                recognition.start();
            }
        };

        recognition.onstart = () => {
            isRecording = true;
            micBtn.classList.add('recording');
        };

        recognition.onresult = (event) => {
            let finalTranscript = '';
            for (let i = event.resultIndex; i < event.results.length; ++i) {
                if (event.results[i].isFinal) {
                    finalTranscript += event.results[i][0].transcript + ' ';
                }
            }
            if (finalTranscript) {
                // Append text to current text
                const currentText = inBody.value.trim();
                inBody.value = currentText ? currentText + ' ' + finalTranscript : finalTranscript;
                updatePreview();
            }
        };

        recognition.onerror = (event) => console.error("Speech Recognition Error", event.error);
        
        recognition.onend = () => {
            isRecording = false;
            micBtn.classList.remove('recording');
        };
    } else {
        micBtn.onclick = () => alert("Microphone not supported in this browser. Try Chrome or Safari.");
    }

    // 5. Copy Share Link (Generates a URL with form data as query parameters)
    function copyShareLink() {
        const url = new URL(window.location.href.split('?')[0]); // Base URL
        inputs.forEach(id => {
            const val = document.getElementById(id).value;
            if(val) url.searchParams.set(id, encodeURIComponent(val));
        });
        
        // Copy to clipboard
        navigator.clipboard.writeText(url.toString()).then(() => {
            alert('Share link generated and copied to clipboard!\n\n' + url.toString());
        }).catch(err => {
            console.error('Failed to copy', err);
        });
    }

    // 6. On Load: Check if URL has query parameters to populate form (for shared links)
    window.onload = function() {
        const params = new URLSearchParams(window.location.search);
        let hasData = false;
        inputs.forEach(id => {
            if (params.has(id)) {
                document.getElementById(id).value = decodeURIComponent(params.get(id));
                hasData = true;
            }
        });
        if (hasData) updatePreview();
    };

    // Initialize Preview on page load
    updatePreview();
</script>
</body>
</html>
