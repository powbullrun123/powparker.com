<!DOCTYPE html>
<html lang="en">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>Powell Parker — ParlayPen Engine</title>
<meta name="description" content="Official correspondence — From the Desk of Powell Parker">
<link rel="icon" type="image/x-icon" href="favicon.ico">
<link href="https://fonts.googleapis.com/css2?family=Cormorant:ital,wght@0,300;0,400;0,500;0,600;0,700;1,300;1,400;1,500;1,600;1,700&family=EB+Garamond:ital,wght@0,400;0,500;0,600;0,700;0,800;1,400;1,500;1,600;1,700&family=Lato:wght@300;400;700&display=swap" rel="stylesheet">
<style>
:root {
  --navy: #1B2A40;
  --deep: #0A1525;
  --gold: #C9A84C;
  --gold-light: #E8D5A3;
  --gold-dark: #9A7A2E;
  --cream: #F5F0E8;
  --text: #1e1e1e;
  --text-light: #5a5a5a;
  --rule: #d8d2c4;
  --mic-active: #64ffda;
}
* { margin: 0; padding: 0; box-sizing: border-box; }
body {
  font-family: 'EB Garamond', Georgia, serif;
  background: #b8b5af;
  -webkit-font-smoothing: antialiased;
}

/* ── EDITOR BAR ── */
.editor-bar {
  background: var(--deep);
  border-bottom: 2px solid var(--gold);
  padding: 10px 16px;
  display: flex;
  align-items: center;
  justify-content: space-between;
  position: sticky;
  top: 0;
  z-index: 100;
  flex-wrap: wrap;
  gap: 8px;
}
.bar-btn {
  font-family: 'Lato', sans-serif;
  font-size: 0.68rem;
  font-weight: 700;
  text-transform: uppercase;
  padding: 7px 14px;
  border: 1px solid var(--gold);
  border-radius: 4px;
  cursor: pointer;
  background: transparent;
  color: var(--gold);
}
.bar-btn:hover, .bar-btn.active { background: var(--gold); color: var(--deep); }
.bar-btn.primary { background: var(--gold); color: var(--deep); }

/* ── PAPER TEXTURES ── */
.page.scroll { background: #f2e8c9; background-image: url('https://www.transparenttextures.com/patterns/parchment.png'); }
.page.legal { background: #fff9c4; background-image: linear-gradient(#e1d8a7 1px, transparent 1px); background-size: 100% 2rem; border-left: 5px double #ff8a8a !important; }
.page.college { background: #fff; background-image: linear-gradient(#9ed1ff 1px, transparent 1px); background-size: 100% 1.6rem; border-left: 2px solid #ffb3b3 !important; }
.page.executive { background: #fdfdfd; }
.page.cream { background: var(--cream); }

/* ── INPUT PANEL ── */
.input-panel {
  max-width: 750px;
  margin: 20px auto;
  background: var(--deep);
  border-radius: 10px;
  padding: 24px;
  display: block;
}
.field-row { margin-bottom: 15px; }
.field-row label { display: block; font-family: 'Lato', sans-serif; font-size: 0.65rem; font-weight: 700; text-transform: uppercase; color: var(--gold-light); margin-bottom: 5px; }
.field-row input, .field-row textarea, .field-row select {
  width: 100%; background: rgba(255,255,255,0.05); border: 1px solid rgba(201,168,76,0.25); border-radius: 6px; padding: 10px; font-family: 'EB Garamond', serif; color: var(--cream); font-size: 1rem;
}
textarea { min-height: 150px; line-height: 1.6; }

/* ── THE PAGE ── */
.page-container { display: flex; justify-content: center; padding: 40px 15px; }
.page {
  width: 816px; min-height: 1056px; background: #fff; box-shadow: 0 10px 50px rgba(0,0,0,0.4);
  position: relative; transition: all 0.3s ease; border: 1px solid #ddd;
}

/* OPTIMIZED LETTERHEAD */
.letterhead { 
  padding: 50px 60px 20px; 
  display: flex; 
  justify-content: space-between; 
  align-items: center; 
}
.lh-brand-group {
  display: flex;
  align-items: center;
}
.lh-seal {
  width: 110px;
  height: 110px;
  border-radius: 50%;
  flex-shrink: 0;
  object-fit: contain;
}
.lh-text-block {
  margin-left: 20px;
}
.lh-name { 
  font-family: 'Cormorant', serif; 
  font-size: 2.2rem; 
  color: var(--navy); 
  font-weight: 700; 
  line-height: 1.1;
}
.lh-motto {
  color: var(--gold-dark); 
  font-family: 'Cormorant', serif; 
  font-size: 0.75rem;
  font-weight: 600;
  letter-spacing: 2px;
  text-transform: uppercase;
  margin-top: 4px;
}

/* IMMERSIVE CLEAN CONTACT BLOCK */
.lh-contact { 
  text-align: right; 
  font-family: 'Lato', sans-serif; 
  font-size: 0.76rem; 
  color: var(--text-light); 
  line-height: 1.7;
  letter-spacing: 0.02em;
}
.lh-contact a {
  color: var(--text-mid);
  text-decoration: none; /* Strips browser underlines */
  transition: color 0.2s ease;
}
.lh-contact a:hover {
  color: var(--gold-dark);
}
.lh-contact .web-highlight {
  font-weight: 700;
  color: var(--gold-dark);
  letter-spacing: 0.05em;
}

.header-rule { 
  height: 1px; 
  margin: 15px 60px 0; 
  background: var(--rule); 
  opacity: 0.6; 
}

.hero-heading-render { font-family: 'Cormorant', serif; font-size: 2.8rem; text-align: center; color: var(--navy); margin: 40px 0; text-transform: uppercase; }
.letter-content { padding: 35px 60px 100px; line-height: 1.85; font-size: 1.1rem; }
.link-btn { display: inline-block; padding: 10px 20px; border: 1px solid var(--gold); color: var(--navy); text-decoration: none; font-family: 'Lato'; font-weight: 700; margin-right: 10px; border-radius: 4px; }

/* ── UTILS ── */
@media (max-width: 820px) { 
  .page { width: 100%; min-height: auto; } 
  .letterhead { flex-direction: column; align-items: center; text-align: center; padding: 30px 20px 10px; gap: 20px; }
  .lh-brand-group { flex-direction: column; text-align: center; }
  .lh-text-block { margin-left: 0; margin-top: 12px; }
  .lh-contact { text-align: center; }
  .header-rule { margin: 10px 20px 0; }
  .letter-content { padding: 30px 20px 80px; }
}
</style>
</head>
<body>

<div class="editor-bar">
  <div class="bar-left" style="display:flex; gap:10px;">
    <select id="paperSelect" class="bar-btn" onchange="renderLetter()">
      <option value="executive">Paper: Executive White</option>
      <option value="scroll">Paper: Ancient Scroll</option>
      <option value="legal">Paper: Legal Yellow</option>
      <option value="college">Paper: College Ruled</option>
      <option value="cream">Paper: Cream Stationery</option>
    </select>
    <select id="toneVault" class="bar-btn">
      <option value="Executive">Profile: Executive</option>
      <option value="Cattleman">Profile: Cattleman</option>
      <option value="Stoic">Profile: Stoic</option>
      <option value="Voss">Profile: Black Swan</option>
    </select>
  </div>
  <div class="bar-right">
    <button class="bar-btn" onclick="toggleMusic()" id="musicBtn">🎵 Music: Off</button>
    <button class="bar-btn primary" onclick="generateAndSave()">Save &amp; Share</button>
  </div>
</div>

<audio id="bgTrack" loop src=""></audio>

<div class="input-panel" id="inputPanel">
  <div style="display:flex; justify-content:space-between; margin-bottom:20px;">
    <h3 style="color:var(--gold); font-family:'Cormorant';">ParlayPen Engine v2.0</h3>
    <button id="micBtn" class="bar-btn" style="border-color:var(--mic-active); color:var(--mic-active);">🎙️ DICTATE</button>
  </div>

  <div class="field-row">
    <label>Big Hero Heading</label>
    <input type="text" id="inHero" placeholder="E.G. PROJECT 88: KEARNY WATER ASSETS">
  </div>

  <div style="display:grid; grid-template-columns: 1fr 1fr; gap:15px;">
    <div class="field-row"><label>Date</label><input type="text" id="inDate"></div>
    <div class="field-row"><label>Recipient</label><input type="text" id="inRecipient" placeholder="Name, Title, Location"></div>
  </div>

  <div class="field-row">
    <label>Message Body</label>
    <textarea id="inBody" placeholder="Start dictating or typing..."></textarea>
  </div>

  <div class="field-row">
    <label>Exhibit Links 🔗</label>
    <div id="linksContainer"></div>
    <button class="bar-btn" onclick="addLink()" style="width:100%; border-style:dashed; margin-top:10px;">+ Add Link Exhibit</button>
  </div>
</div>

<div class="page-container">
  <div class="page executive" id="letterPage">
    <div class="letterhead">
      <div class="lh-brand-group">
        <img src="https://powparker.com/powparker-logo.webp" class="lh-seal" alt="Powell Parker Seal">
        <div class="lh-text-block">
          <div class="lh-name">Powell Parker</div>
          <div class="lh-motto">FROM THE DESK OF POWELL PARKER</div>
        </div>
      </div>
      <div class="lh-contact">
        <div><a href="mailto:powell@powparker.com">powell@powparker.com</a></div>
        <div><a href="tel:4807882320">(480) 788-2320</a></div>
        <div style="margin-top: 2px;"><a href="https://www.powparker.com" target="_blank" class="web-highlight">powparker.com</a></div>
        <div style="font-size: 0.68rem; color: #777; text-transform: uppercase; letter-spacing: 1px; margin-top: 3px;">Mesa, Arizona</div>
      </div>
    </div>
    
    <div class="header-rule"></div>

    <div class="letter-content">
      <div id="outHero" class="hero-heading-render"></div>
      <div id="outDate" style="font-family:'Lato'; font-size:0.8rem; margin-bottom:25px; color: var(--text-light);"></div>
      <div id="outRecipient" style="margin-bottom:30px; font-size: 1rem; line-height: 1.6;"></div>
      <div id="outBody"></div>
      <div id="outLinks" style="margin-top:30px;"></div>
    </div>
  </div>
</div>

<script>
// --- DICTATION ---
const micBtn = document.getElementById('micBtn');
const inBody = document.getElementById('inBody');
const SpeechRecognition = window.SpeechRecognition || window.webkitSpeechRecognition;

if (SpeechRecognition) {
  const recognition = new SpeechRecognition();
  recognition.continuous = true;
  recognition.interimResults = true;
  let recording = false;

  micBtn.onclick = () => {
    if(!recording) {
      recognition.start();
      recording = true; micBtn.style.color = "#ff4c4c"; micBtn.innerText = "🛑 STOP";
    } else {
      recognition.stop();
      recording = false; micBtn.style.color = "#64ffda"; micBtn.innerText = "🎙️ DICTATE";
    }
  };
  recognition.onresult = (e) => {
    let t = ""; for (let i=e.resultIndex; i<e.results.length; i++) t += e.results[i][0].transcript;
    inBody.value = t; renderLetter();
  };
}

// --- MUSIC ---
let playing = false;
function toggleMusic() {
  const track = document.getElementById('bgTrack');
  const btn = document.getElementById('musicBtn');
  if(!playing) { track.play(); btn.innerText = "🎵 Music: ON"; playing = true; }
  else { track.pause(); btn.innerText = "🎵 Music: OFF"; playing = false; }
}

// --- LINKS ---
function addLink() {
  const div = document.createElement('div');
  div.style = "display:grid; grid-template-columns: 1fr 2fr; gap:10px; margin-top:10px;";
  div.innerHTML = `<input type="text" class="l-label" placeholder="Label"><input type="text" class="l-url" placeholder="URL">`;
  document.getElementById('linksContainer').appendChild(div);
}

// --- RENDER ---
function renderLetter() {
  const page = document.getElementById('letterPage');
  page.className = "page " + document.getElementById('paperSelect').value;
  
  document.getElementById('outHero').innerText = document.getElementById('inHero').value;
  document.getElementById('outDate').innerText = document.getElementById('inDate').value;
  
  const recipientVal = document.getElementById('inRecipient').value;
  if (recipientVal) {
    document.getElementById('outRecipient').innerHTML = "<strong>" + recipientVal.replace(/,/g, '<br>') + "</strong>";
  }
  
  document.getElementById('outBody').innerHTML = document.getElementById('inBody').value.split('\n').map(p => `<p style="margin-bottom:15px; text-align:justify;">${p}</p>`).join('');
  
  const outLinks = document.getElementById('outLinks');
  outLinks.innerHTML = "";
  const labels = document.querySelectorAll('.l-label');
  const urls = document.querySelectorAll('.l-url');
  labels.forEach((l, i) => {
    if(l.value && urls[i].value) {
      const a = document.createElement('a');
      a.href = urls[i].value; a.className = "link-btn"; a.innerText = "🔗 " + l.value;
      outLinks.appendChild(a);
    }
  });
}

function generateAndSave() {
  renderLetter(); alert("Letter Saved to Engine. Ready for Sharing.");
}

// Init Date
document.getElementById('inDate').value = new Date().toLocaleDateString('en-US', {month:'long', day:'numeric', year:'numeric'});
setInterval(renderLetter, 1000);
</script>
</body>
</html>
